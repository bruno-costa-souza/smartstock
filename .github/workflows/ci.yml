name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint / test / build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint / build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

  # ─── E2E (apenas na branch main) ─────────────────────────────────────────
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright deps
        working-directory: e2e
        run: npm ci

      - name: Install browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Start stack
        run: docker compose up -d --wait
        env:
          JWT_SECRET: ci_jwt_secret_minimum_32_characters_long
          JWT_REFRESH_SECRET: ci_refresh_secret_minimum_32_characters_long

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test
        env:
          BASE_URL: http://localhost:5173

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
